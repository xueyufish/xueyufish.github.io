twitter_username:   xueyufish

# Build settings
highlighter: rouge
permalink: pretty
paginate: 10
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md", "scripts", "*.gemspec"]
anchorjs: true

# 性能优化配置
# 减少构建时间
incremental: true
# 禁用不必要的插件
# 只保留必需的插件
plugins:
  - jekyll-paginate

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# 压缩 HTML
compress_html:
  clippings: []
  comments: []
  endings: []
  ignore:
    envs: []
  blanklines: false
  profile: false
  startings: []

