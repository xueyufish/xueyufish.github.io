<!-- Footer -->
<footer>
    <div class="footer-inner">
        <div class="footer-bottom">
                <p class="copyright text-muted">
                        &copy; {{ site.time | date: "%Y" }} {{ site.full_name }}
                    </p>
            <div class="theme-toggle-group">
                <button class="theme-toggle-btn" data-theme="light" aria-label="日间模式" title="日间模式">
                    <i class="fa fa-sun-o"></i>
                </button>
                <button class="theme-toggle-btn" data-theme="dark" aria-label="夜间模式" title="夜间模式">
                    <i class="fa fa-moon-o"></i>
                </button>
                <button class="theme-toggle-btn" data-theme="system" aria-label="跟随系统" title="跟随系统">
                    <i class="fa fa-desktop"></i>
                </button>
            </div>
        </div>
    </div>
</footer>

<!-- 回到顶部按钮 -->
<button id="back-to-top" aria-label="回到顶部" title="回到顶部">
    <i class="fa fa-arrow-up"></i>
</button>

<!-- 核心库 - 预加载并同步加载 jQuery -->
<script src="{{ "/assets/js/jquery.min.js" | prepend: site.baseurl }}"></script>

<!-- 合并后的主要 JS 文件（Bootstrap + 主题切换 + 搜索 + 目录） -->
<script src="{{ "/assets/js/main.min.js" | prepend: site.baseurl }}"></script>

<!-- 图片懒加载 -->
<script src="{{ "/assets/js/lazyload.js" | prepend: site.baseurl }}"></script>

<!-- 标签云 - 按需加载 -->
<script>
(function() {
    // 只在存在标签云元素的页面加载
    if($('#tag_cloud').length !== 0){
        var script = document.createElement('script');
        script.src = "{{ "/assets/js/jquery.tagcloud.js" | prepend: site.baseurl }}";
        script.async = true;
        script.onload = function() {
            $.fn.tagcloud.defaults = {
                color: {start: '#bbbbee', end: '#2a9bb3'},
            };
            $('#tag_cloud a').tagcloud();
        };
        document.head.appendChild(script);
    }
})();
</script>

<!-- FastClick - 移动端触摸优化 -->
<script>
(function() {
    // 只在移动设备加载
    if ('addEventListener' in document && 'ontouchstart' in window) {
        var script = document.createElement('script');
        script.src = "https://cdn.bootcss.com/fastclick/1.0.6/fastclick.min.js";
        script.async = true;
        script.onload = function() {
            if (typeof FastClick !== 'undefined') {
                var $nav = document.querySelector("nav");
                if($nav) FastClick.attach($nav);
            }
        };
        document.head.appendChild(script);
    }
})();
</script>

<!-- Baidu Tongji - 百度统计 -->
{% if site.ba_track_id %}
<script>
(function() {
    var _baId = '{{ site.ba_track_id }}';
    var _hmt = _hmt || [];
    (function() {
      var hm = document.createElement("script");
      hm.src = "//hm.baidu.com/hm.js?" + _baId;
      hm.async = true;
      var s = document.getElementsByTagName("script")[0];
      s.parentNode.insertBefore(hm, s);
    })();
})();
</script>
{% endif %}
